server:
  port: 8082

spring:
  application:
    name: product-service
  config:
    import: "optional:configserver:http://config-server:8888"
  cloud:
    config:
      enabled: true

eureka:
  client:
    serviceUrl:
      defaultZone: http://eureka-server:8761/eureka/

# Si instalaste Actuator en el pom.xml del product-service, 
# usa este bloque. Si no lo instalaste, puedes borrar todo esto.
management:
  endpoints:
    web:
      exposure:
        include: "*"